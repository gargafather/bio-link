<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Thai Advice</title>
<meta name="description" content="Curated fashion &amp; lifestyle finds — Thai Advice."/>
<meta name="theme-color" content="#ffffff"/>
<meta property="og:title" content="Thai Advice"/>
<meta property="og:description" content="Curated fashion &amp; lifestyle finds."/>
<style>
:root{
  --bg:#ffffff;
  --card:#f9f9fb;
  --border:#ececf0;
  --pink:#e91e8c;
  --pink2:#ff6bb5;
  --text:#111118;
  --muted:#888899;
  --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100svh;
  padding:24px 16px;
}
.card{
  width:100%;
  max-width:380px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 28px 32px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.07);
  animation:up .35s ease;
}
@keyframes up{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.logo{
  width:60px;height:60px;
  border-radius:16px;
  margin:0 auto 18px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;color:#fff;letter-spacing:-1px;
  box-shadow:0 6px 20px rgba(233,30,140,0.28);
}
h1{
  font-size:clamp(1.5rem,5vw,1.9rem);
  font-weight:800;
  letter-spacing:-0.03em;
  line-height:1.15;
  color:var(--text);
  margin-bottom:8px;
}
h1 span{color:var(--pink)}
.sub{
  font-size:.875rem;
  color:var(--muted);
  line-height:1.55;
  margin-bottom:24px;
}
.progress-wrap{
  height:3px;
  background:#ececf0;
  border-radius:99px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  border-radius:99px;
  transition:width linear;
}
.btn{
  display:block;
  width:100%;
  padding:15px 20px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-family:inherit;
  font-size:1rem;font-weight:700;
  border:none;border-radius:var(--radius);
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 18px rgba(233,30,140,0.32);
  -webkit-tap-highlight-color:transparent;
  transition:filter .15s,transform .12s,box-shadow .15s;
}
.btn:hover{filter:brightness(1.06);box-shadow:0 6px 24px rgba(233,30,140,0.42)}
.btn:active{transform:scale(0.97)}
.note{margin-top:14px;font-size:.7rem;color:var(--muted);opacity:.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">TA</div>
  <h1>Thai <span>Advice</span></h1>
  <p class="sub">Loading Thai Advice…<br/>Taking you to the store now.</p>
  <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
  <a class="btn" href="https://www.thaiadvice.net/" id="cta">Continue to Thai Advice →</a>
  <p class="note">You'll be redirected automatically</p>
</div>
<script>
var TARGET = 'https://www.thaiadvice.net/';
var DELAY  = 1000;
var bar    = document.getElementById('bar');
var t;

function animateBar(ms) {
  setTimeout(function(){
    bar.style.transitionDuration = ms + 'ms';
    bar.style.width = '100%';
  }, 30);
}

function fallback() {
  animateBar(DELAY);
  t = setTimeout(function(){ window.location.href = TARGET; }, DELAY);
}

function tryTikTokBridge() {
  try {
    var jb = window.JSBridge;
    if (!jb || typeof jb.call !== 'function') return false;

    var cfg   = jb.getConfig();
    var token = cfg && cfg.secure && cfg.secure.token;
    if (!token) return false;

    // Fill bar instantly — bridge opens new view, no navigation needed
    animateBar(200);

    jb.call('BDXBridgeOpenAdLandPageMethod', {
      url:              TARGET,
      landingStyle:     1,
      title:            '',
      isDeeplink:       1,
      refer:            'landing_page',
      _jsb_secure_token: token
    }, function(res) {
      // Native returned an error — fall back to hard redirect
      if (!res || res.code !== 0) {
        window.location.href = TARGET;
      }
    });

    return true;
  } catch(e) {
    return false;
  }
}

if (!tryTikTokBridge()) {
  fallback();
}

document.getElementById('cta').addEventListener('click', function(){
  clearTimeout(t);
  if (!tryTikTokBridge()) window.location.href = TARGET;
});
</script>
</body>
</html>
