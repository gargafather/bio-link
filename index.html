<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ─── SEO / Social ─────────────────────────────── -->
  <title>Thai Advice</title>
  <meta name="description" content="Your trusted source for Thailand lifestyle, travel, and advice." />
  <meta name="theme-color" content="#090910" />
  <meta property="og:title" content="Thai Advice" />
  <meta property="og:description" content="Your trusted source for Thailand lifestyle, travel, and advice." />

  <!--
  ═══════════════════════════════════════════════════════
   BRIDGE PAGE — bio.thaiadvice.net
   Redirects to → /page.html after REDIRECT_DELAY ms.
   Edit the values in the CONFIG block below.
  ═══════════════════════════════════════════════════════
  -->

  <style>
    /* ── CONFIG: tweak these variables to retheme ────── */
    :root {
      --bg:         #090910;       /* page background          */
      --card:       #12121e;       /* card background          */
      --accent:     #a855f7;       /* purple accent            */
      --accent2:    #ec4899;       /* pink accent              */
      --text:       #f0f0f5;       /* primary text             */
      --muted:      #7070a0;       /* secondary text           */
      --btn-radius: 14px;
    }

    /* ── Reset ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout: full-screen centered card ───────────── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;          /* svh = safe viewport height on mobile */
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid rgba(168,85,247,0.15);
      border-radius: 24px;
      padding: 40px 32px 36px;
      text-align: center;
      /* subtle glow */
      box-shadow:
        0 0 0 1px rgba(168,85,247,0.08),
        0 20px 60px rgba(0,0,0,0.6),
        0 0 80px rgba(168,85,247,0.06);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo mark ────────────────────────────────────── */
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      /* soft outer glow */
      box-shadow: 0 8px 24px rgba(168,85,247,0.35);
    }

    /* ── Headline ─────────────────────────────────────── */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      /* gradient text */
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    /* ── Tagline ──────────────────────────────────────── */
    p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── Progress bar ─────────────────────────────────── */
    .progress-wrap {
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      /* duration is set via JS to match REDIRECT_DELAY */
      transition: width linear;
    }

    /* ── Enter button ─────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      text-decoration: none;
      /* glow pulse */
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      animation: pulse 2.4s ease-out infinite;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.15s, transform 0.12s;
    }
    .btn:hover  { filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }

    @keyframes pulse {
      0%   { box-shadow: 0 4px 20px rgba(168,85,247,0.4); }
      50%  { box-shadow: 0 4px 32px rgba(168,85,247,0.65); }
      100% { box-shadow: 0 4px 20px rgba(168,85,247,0.4); }
    }

    /* ── Footer note ──────────────────────────────────── */
    .note {
      margin-top: 16px;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.55;
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- Logo: change letter(s) or swap for an <img> tag -->
    <div class="logo">TA</div>

    <!-- ── EDIT: Headline ── -->
    <h1>Thai Advice</h1>

    <!-- ── EDIT: Tagline / description ── -->
    <p>Your trusted source for Thailand<br />lifestyle, travel &amp; real advice.</p>

    <!-- Auto-redirect progress bar (animated via JS) -->
    <div class="progress-wrap">
      <div class="progress-bar" id="bar"></div>
    </div>

    <!-- ── EDIT: Button text & href ── -->
    <a class="btn" href="/page.html" id="cta">Enter Thai Advice →</a>

    <p class="note">Redirecting you automatically…</p>

  </div>

  <script>
    // ── CONFIG ────────────────────────────────────────────
    var REDIRECT_URL   = '/page.html';   // destination URL
    var REDIRECT_DELAY = 1500;           // milliseconds (1500 = 1.5 s)
    // ─────────────────────────────────────────────────────

    // Animate the progress bar over REDIRECT_DELAY ms
    var bar = document.getElementById('bar');
    // Small tick so transition triggers after paint
    setTimeout(function () {
      bar.style.transitionDuration = REDIRECT_DELAY + 'ms';
      bar.style.width = '100%';
    }, 30);

    // Redirect after delay
    var timer = setTimeout(function () {
      window.location.href = REDIRECT_URL;
    }, REDIRECT_DELAY);

    // CTA button also clears the timer (instant nav on tap)
    document.getElementById('cta').addEventListener('click', function () {
      clearTimeout(timer);
      // href handles the navigation — nothing else needed
    });
  </script>

</body>
</html>
