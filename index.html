<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Thai Advice</title>
<meta name="description" content="Fashion &amp; lifestyle tips — Thai Advice."/>
<meta name="theme-color" content="#ffffff"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#fff;color:#111;-webkit-font-smoothing:antialiased;}
body{display:flex;align-items:center;justify-content:center;min-height:100svh;padding:24px 16px;}
.card{width:100%;max-width:380px;text-align:center;}
.logo{width:72px;height:72px;border-radius:20px;margin:0 auto 20px;background:linear-gradient(135deg,#e91e8c,#ff6bb5);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px;}
h1{font-size:1.75rem;font-weight:800;letter-spacing:-.03em;margin-bottom:8px;}
h1 span{color:#e91e8c;}
p{font-size:.9375rem;color:#555;line-height:1.6;margin-bottom:28px;}
.btn{display:block;padding:15px 24px;background:linear-gradient(135deg,#e91e8c,#ff6bb5);color:#fff;font-size:1rem;font-weight:700;border-radius:14px;text-decoration:none;box-shadow:0 4px 18px rgba(233,30,140,.28);transition:filter .15s,transform .12s;}
.btn:hover{filter:brightness(1.06);}
.btn:active{transform:scale(.97);}
.foot{margin-top:24px;font-size:.75rem;color:#aaa;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">TA</div>
  <h1>Thai <span>Advice</span></h1>
  <p>Fashion &amp; lifestyle inspiration — curated just for you.</p>
  <a class="btn" href="https://www.thaiadvice.net/">Visit Thai Advice</a>
  <p class="foot">&copy; <script>document.write(new Date().getFullYear())</script> Thai Advice</p>
</div>
</body>
</html>
